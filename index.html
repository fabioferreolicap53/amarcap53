    <script>
// Captura beforeinstallprompt ANTES de qualquer script carregar
window.__deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function (e) {
  e.preventDefault();
  window.__deferredPrompt = e;
});
</script>
    <script>
      (function () {
        var path = window.location.pathname.toLowerCase();
        var search = window.location.search;
        var hash = window.location.hash.toLowerCase();
        var isAuthAction =
          path.indexOf('/verify-email') !== -1 ||
          path.indexOf('/confirm-verification') !== -1 ||
          path.indexOf('/reset-password') !== -1 ||
          path.indexOf('/confirm-password-reset') !== -1 ||
          path.indexOf('/confirm-email-change') !== -1;
        var isLoginHash =
          hash === '#/login' ||
          hash === '#login' ||
          hash.indexOf('#/login?') === 0 ||
          hash.indexOf('#/signin') === 0 ||
          hash.indexOf('#/auth') === 0;

        if (isAuthAction && isLoginHash) {
          window.history.replaceState(null, '', window.location.pathname + search);
        }
      })();
    </script>
