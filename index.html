<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMARCAP53</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AMAR RASTREIO">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%231c2e4a%22/><path d=%22M30 50 L45 50 L50 35 L60 65 L65 50 L80 50%22 stroke=%22%23ffffff%22 stroke-width=%226%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22 fill=%22none%22/></svg>">
    <script>
      (function () {
        var path = window.location.pathname.toLowerCase();
        var search = window.location.search;
        var hash = window.location.hash.toLowerCase();
        var isAuthAction =
          path.indexOf('/verify-email') !== -1 ||
          path.indexOf('/confirm-verification') !== -1 ||
          path.indexOf('/reset-password') !== -1 ||
          path.indexOf('/confirm-password-reset') !== -1 ||
          path.indexOf('/confirm-email-change') !== -1;
        var isLoginHash =
          hash === '#/login' ||
          hash === '#login' ||
          hash.indexOf('#/login?') === 0 ||
          hash.indexOf('#/signin') === 0 ||
          hash.indexOf('#/auth') === 0;

        if (isAuthAction && isLoginHash) {
          window.history.replaceState(null, '', window.location.pathname + search);
        }

        // Verificação de e-mail: processa ?verify=TOKEN ANTES de qualquer framework
        // Funciona mesmo se o JavaScript do React não carregar
        var params = new URLSearchParams(window.location.search);
        var token = params.get('verify');
        if (token) {
          // Usa a mesma URL do PocketBase que o app usa
          var pbUrl = 'https://centraldedados.dev.br';
          // Limpa a URL imediatamente
          window.history.replaceState(null, '', window.location.pathname);

          // Envia token para PocketBase via fetch (se disponível)
          if (window.fetch) {
            fetch(pbUrl + '/api/verification/confirm', {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
              body: 'token=' + encodeURIComponent(token),
            }).then(function(resp) {
              // Redireciona para a raiz com flag de sucesso
              window.location.href = window.location.pathname + '?verified=1';
            }).catch(function() {
              // Em caso de erro de rede, redireciona com erro
              window.location.href = window.location.pathname + '?verify_error=1';
            });
          } else {
            // Fallback: formulário HTML para navegadores sem fetch
            var form = document.createElement('form');
            form.method = 'POST';
            form.action = pbUrl + '/api/verification/confirm';
            form.style.display = 'none';
            var input = document.createElement('input');
            input.type = 'hidden';
            input.name = 'token';
            input.value = token;
            form.appendChild(input);
            document.body.appendChild(form);
            form.submit();
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
